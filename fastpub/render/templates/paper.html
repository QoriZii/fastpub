<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE_EN}}</title>
<style>
  :root {
    --bg: #ffffff; --fg: #1a1a2e; --accent: #2563eb;
    --card-bg: #f8fafc; --border: #e2e8f0; --muted: #64748b;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f172a; --fg: #e2e8f0; --accent: #60a5fa;
      --card-bg: #1e293b; --border: #334155; --muted: #94a3b8;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg); color: var(--fg);
    max-width: 900px; margin: 0 auto; padding: 40px 24px;
    line-height: 1.7;
  }
  .lang-toggle {
    position: fixed; top: 16px; right: 16px; z-index: 100;
    display: flex; gap: 4px; background: var(--card-bg);
    border: 1px solid var(--border); border-radius: 8px; padding: 4px;
  }
  .lang-toggle button {
    border: none; padding: 6px 14px; border-radius: 6px;
    cursor: pointer; font-size: 14px; font-weight: 600;
    background: transparent; color: var(--muted);
  }
  .lang-toggle button.active {
    background: var(--accent); color: #fff;
  }
  header { margin-bottom: 48px; }
  header h1 { font-size: 2rem; margin-bottom: 12px; }
  .meta { color: var(--muted); font-size: 0.9rem; margin-bottom: 8px; }
  .keywords { color: var(--accent); font-size: 0.85rem; }
  .abstract { margin: 24px 0; padding: 20px; background: var(--card-bg); border-radius: 12px; border: 1px solid var(--border); }
  .abstract h2 { font-size: 1.1rem; margin-bottom: 8px; color: var(--accent); }
  .narrative { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; margin: 32px 0; }
  .card { padding: 20px; background: var(--card-bg); border-radius: 12px; border: 1px solid var(--border); }
  .card h3 { font-size: 0.9rem; color: var(--accent); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em; }
  .paper-section { margin: 32px 0; }
  .paper-section h2 { font-size: 1.3rem; margin-bottom: 12px; border-bottom: 2px solid var(--accent); padding-bottom: 8px; }
  figure { margin: 24px 0; text-align: center; }
  figure img { max-width: 100%; border-radius: 8px; }
  figcaption { margin-top: 8px; color: var(--muted); font-size: 0.85rem; }
  footer { margin-top: 64px; padding-top: 24px; border-top: 1px solid var(--border); color: var(--muted); font-size: 0.8rem; text-align: center; }
</style>
</head>
<body>

<nav class="lang-toggle">
  <button id="btn-en" class="active" onclick="setLang('en')">EN</button>
  <button id="btn-zh" onclick="setLang('zh')">中文</button>
</nav>

<header>
  <h1>
    <span class="en">{{TITLE_EN}}</span>
    <span class="zh" hidden>{{TITLE_ZH}}</span>
  </h1>
  <div class="meta">{{AUTHORS}}</div>
  <div class="meta">{{VENUE}} {{YEAR}}</div>
  <div class="keywords">{{KEYWORDS}}</div>
</header>

<div class="abstract">
  <h2>Abstract</h2>
  <p class="en">{{ABSTRACT_EN}}</p>
  <p class="zh" hidden>{{ABSTRACT_ZH}}</p>
</div>

<div class="narrative">
{{NARRATIVE_HTML}}
</div>

{{SECTIONS_HTML}}

<div class="figures">
{{FIGURES_HTML}}
</div>

<footer>
  Generated by FastPub
</footer>

<script>
function setLang(lang) {
  document.querySelectorAll('.en').forEach(el => el.hidden = lang !== 'en');
  document.querySelectorAll('.zh').forEach(el => el.hidden = lang !== 'zh');
  document.getElementById('btn-en').classList.toggle('active', lang === 'en');
  document.getElementById('btn-zh').classList.toggle('active', lang === 'zh');
}
</script>
</body>
</html>
